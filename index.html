<!DOCTYPE html>
<html>
<head>
  <title>Forson Data Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0b0f19;
      --text: white;
      --card: #111827;
    }

    body.light {
      --bg: #f3f4f6;
      --text: #111;
      --card: white;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: 0.3s ease;
    }

    header {
      background: linear-gradient(135deg, #FFD700, #E10600, #0057B8);
      padding: 60px 20px;
      color: white;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
    }

    .toggle-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
    }

    .network-title {
      margin-top: 40px;
      font-size: 24px;
    }

    .card {
      background: var(--card);
      margin: 20px auto;
      padding: 25px;
      border-radius: 18px;
      width: 95%;
      max-width: 450px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 5px 20px rgba(0,0,0,0.4);
      text-decoration: none;
      color: inherit;
      display: block;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .price {
      color: #FFD700;
      font-size: 22px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin: 15px;
      padding: 15px 35px;
      font-size: 18px;
      background: linear-gradient(135deg, #0057B8, #E10600);
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .float {
      position: fixed;
      width: 65px;
      height: 65px;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      border-radius: 50%;
      font-size: 30px;
      line-height: 65px;
      text-decoration: none;
      box-shadow: 0 4px 12px black;
    }

    footer {
      padding: 20px;
      background: var(--card);
      margin-top: 50px;
    }

  </style>
</head>

<body>

<header>
  <button class="toggle-btn" onclick="toggleMode()">🌙 / ☀️</button>
  <h1>Forson Data Hub</h1>
  <p>MTN Direct Purchase | Other Networks via WhatsApp</p>
</header>

<div class="section">

  <div class="network-title">🟡 MTN Packages (Direct Buy)</div>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10402&network=mtn" target="_blank">
    1GB - GHS 5.3
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10407&network=mtn" target="_blank">
    2GB - GHS 10.9
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10410&network=mtn" target="_blank">
    3GB - GHS 15.8
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10413&network=mtn" target="_blank">
    4GB - GHS 21
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10415&network=mtn" target="_blank">
    5GB - GHS 27
  </a>

  <div class="network-title">🔴 Telecel</div>
  <a class="btn" href="https://wa.me/233548603224?text=I%20want%20Telecel%20data" target="_blank">
    Order Telecel via WhatsApp
  </a>

  <div class="network-title">🔴🔵 AirtelTigo</div>
  <a class="btn" href="https://wa.me/233548603224?text=I%20want%20AirtelTigo%20data" target="_blank">
    Order AirtelTigo via WhatsApp
  </a>

</div>

<a href="https://wa.me/233548603224" class="float" target="_blank">💬</a>

<footer>
  © 2026 Forson Data Hub
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
