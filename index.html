<!DOCTYPE html>
<html>
<head>
  <title>Forson Data Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0b0f19;
      --text: white;
      --card: #111827;
      --primary: #4f46e5;
      --secondary: #9333ea;
    }

    body.light {
      --bg: #f3f4f6;
      --text: #111;
      --card: white;
      --primary: #2563eb;
      --secondary: #06b6d4;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: 0.3s;
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      padding: 60px 20px;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
    }

    .toggle-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
    }

    .card {
      background: var(--card);
      margin: 20px auto;
      padding: 25px;
      border-radius: 18px;
      width: 95%;
      max-width: 450px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 5px 20px rgba(0,0,0,0.4);
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .price {
      color: #facc15;
      font-size: 22px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin: 12px;
      padding: 14px 35px;
      font-size: 18px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .float {
      position: fixed;
      width: 65px;
      height: 65px;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      border-radius: 50%;
      font-size: 30px;
      line-height: 65px;
      text-decoration: none;
      box-shadow: 0 4px 12px black;
    }

    footer {
      padding: 20px;
      background: var(--card);
      margin-top: 50px;
    }

  </style>
</head>

<body>

<header>
  <button class="toggle-btn" onclick="toggleMode()">🌙 / ☀️</button>
  <h1>Forson Data Hub</h1>
  <p>Fast • Reliable • Affordable</p>

<div class="section">

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10410&network=mtn" target="_blank">
    3GB
    <div class="price">GHS 15.8</div>
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10413&network=mtn" target="_blank">
    4GB
    <div class="price">GHS 21</div>
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10415&network=mtn" target="_blank">
    5GB
    <div class="price">GHS 27</div>
  </a>

  <br>

  <a class="btn" href="https://wa.me/233548603224" target="_blank">
    💬 WhatsApp Support
  </a>

  <a class="btn" href="https://datatrade.store/Forson_Data_Hub" target="_blank">
    🛒 Full Store
  </a>

</div>

<a href="https://wa.me/233548603224" class="float" target="_blank">💬</a>

<footer>
  © 2026 Forson Data Hub

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
