<!DOCTYPE html>
<html>
<head>
  <title>Forson Data Hub - Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    .login, .dashboard {
      display: none;
      padding: 30px;
    }

    .active {
      display: block;
    }

    input {
      padding: 12px;
      margin: 10px;
      width: 80%;
      max-width: 300px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 12px 25px;
      border-radius: 25px;
      border: none;
      background: #4f46e5;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    }

    table {
      width: 100%;
      margin-top: 30px;
      border-collapse: collapse;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #334155;
    }

    th {
      background: #1e293b;
    }

  </style>
</head>

<body>

<!-- LOGIN PAGE -->
<div class="login active" id="loginPage">
  <h2>Admin Login</h2>
  <input type="password" id="password" placeholder="Enter Admin Password">
  <br>
  <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

  <h1>Forson Data Hub Dashboard</h1>

  <div class="cards">

    <div class="card">
      <h3>Total Revenue</h3>
      <p>GHS 0.00</p>
    </div>

    <div class="card">
      <h3>Total Orders</h3>
      <p>0</p>
    </div>

    <div class="card">
      <h3>Pending Orders</h3>
      <p>0</p>
    </div>

  </div>

  <table>
    <tr>
      <th>Order ID</th>
      <th>Network</th>
      <th>Amount</th>
      <th>Status</th>
    </tr>
    <tr>
      <td>#001</td>
      <td>MTN</td>
      <td>GHS 5.3</td>
      <td>Completed</td>
    </tr>
  </table>

</div>

<script>
function login() {
  const password = document.getElementById("password").value;

  if(password === "admin123") {
    document.getElementById("loginPage").classList.remove("active");
    document.getElementById("dashboard").classList.add("active");
  } else {
    alert("Wrong password!");
  }
}
</script>

</body>
</html>
