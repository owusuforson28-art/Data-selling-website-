<!DOCTYPE html>
<html>
<head>
  <title>Forson Data Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg: #0b0f19;
      --text: white;
      --card: #111827;
    }

    body.light {
      --bg: #f3f4f6;
      --text: #111;
      --card: white;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      transition: 0.3s;
    }

    header {
      background: linear-gradient(135deg, #FFD700, #E10600, #0057B8);
      padding: 60px 20px;
      color: white;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 34px;
    }

    .toggle-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 8px 14px;
      border-radius: 20px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
    }

    .card {
      background: var(--card);
      margin: 20px auto;
      padding: 22px;
      border-radius: 18px;
      width: 95%;
      max-width: 450px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 5px 20px rgba(0,0,0,0.4);
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .price {
      color: #FFD700;
      font-size: 22px;
      margin-top: 8px;
    }

    .btn {
      display: inline-block;
      margin: 12px;
      padding: 14px 30px;
      font-size: 16px;
      background: #E10600;
      color: white;
      text-decoration: none;
      border-radius: 30px;
      font-weight: bold;
    }

    .float {
      position: fixed;
      width: 65px;
      height: 65px;
      bottom: 20px;
      right: 20px;
      background: #25D366;
      color: white;
      border-radius: 50%;
      font-size: 30px;
      line-height: 65px;
      text-decoration: none;
      box-shadow: 0 4px 12px black;
    }

    footer {
      padding: 20px;
      background: var(--card);
      margin-top: 50px;
    }

  </style>
</head>

<body>

<header>
  <button class="toggle-btn" onclick="toggleMode()">🌙 / ☀️</button>
  <h1>Forson Data Hub</h1>
  <p>MTN Direct | Store Access | WhatsApp | SMS</p>
</header>

<div class="section">

  <h2>🟡 MTN Direct Purchase</h2>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10402&network=mtn" target="_blank">
    1GB - GHS 5.3
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub" target="_blank">
    🛒 Access MTN Full Store
  </a>

  <h2>🔴 Telecel</h2>
  <a class="btn" href="https://wa.me/233548603224?text=I%20want%20Telecel%20data" target="_blank">
    Order via WhatsApp
  </a>

  <h2>🔴🔵 AirtelTigo</h2>
  <a class="btn" href="https://wa.me/233548603224?text=I%20want%20AirtelTigo%20data" target="_blank">
    Order via WhatsApp
  </a>

  <h2>📩 SMS Orders</h2>
  <a class="btn" href="sms:233548603224?body=I%20want%20to%20order%20data">
    Send SMS
  </a>

</div>

<a href="https://wa.me/233548603224" class="float" target="_blank">💬</a>

<footer>
  © 2026 Forson Data Hub
</footer>

<script>
function toggleMode() {
  document.body.classList.toggle("light");
}
</script>

</body>
</html>
