<!DOCTYPE html>
<html>
<head>
  <title>Forson Data Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    :root {
      --bg-color: #0b0f19;
      --text-color: white;
      --card-bg: #111827;
      --header-gradient: linear-gradient(135deg, #4f46e5, #9333ea);
    }

    body.light {
      --bg-color: #f7f9fc;
      --text-color: #111;
      --card-bg: #fff;
      --header-gradient: linear-gradient(135deg, #2563eb, #06b6d4);
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      text-align: center;
      transition: 0.3s ease;
    }

    header {
      background: var(--header-gradient);
      padding: 50px 20px;
      color: white;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    .toggle-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 40px 20px;
    }

    .card {
      background: var(--card-bg);
      margin: 15px auto;
      padding: 20px;
      border-radius: 15px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.4);
      transition: 0.3s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .price {
      font-size: 22px;
      font-weight: bold;
      color: #facc15;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 25px;
      background: #4f46e5;
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      opacity: 0.8;
    }

    .float {
      position: fixed;
      width: 60px;
      height: 60px;
      bottom: 20px;
      right: 20px;
      background-color: #25D366;
      color: #FFF;
      border-radius: 50%;
      text-align: center;
      font-size: 28px;
      line-height: 60px;
      text-decoration: none;
      box-shadow: 2px 2px 10px #000;
    }

    footer {
      padding: 20px;
      background: var(--card-bg);
      font-size: 14px;
      margin-top: 40px;
    }
  </style>
</head>

<body>

<header>
  <button class="toggle-btn" onclick="toggleMode()">🌙 / ☀️</button>
  <h1>Forson Data Hub</h1>
  <p>Fast • Reliable • Affordable Data Bundles</p>
</header>

<div class="section">
  <h2>Click a Package to Buy</h2>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10402&network=mtn" target="_blank">
    <h3>1GB</h3>
    <p class="price">GHS 5</p>
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10407&network=mtn" target="_blank">
    <h3>2GB</h3>
    <p class="price">GHS 10</p>
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10410&network=mtn" target="_blank">
    <h3>3GB</h3>
    <p class="price">GHS 14.5</p>
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10413&network=mtn" target="_blank">
    <h3>4GB</h3>
    <p class="price">GHS 19</p>
  </a>

  <a class="card" href="https://datatrade.store/Forson_Data_Hub/buy?package=10415&network=mtn" target="_blank">
    <h3>5GB</h3>
    <p class="price">GHS 24</p>
  </a>

  <br>

  <a class="btn" href="https://wa.me/233548603224" target="_blank">
    💬 Order on WhatsApp
  </a>

  <a class="btn" href="https://datatrade.store/Forson_Data_Hub" target="_blank">
    🛒 Visit Full Store
  </a>

</div>

<a href="https://wa.me/233548603224" class="float" target="_blank">💬</a>

<footer>
  © 2026 Forson Data Hub | All Rights Reserved
</footer>

<script>
  function toggleMode() {
    document.body.classList.toggle("light");
  }
</script>

</body>
</html>
